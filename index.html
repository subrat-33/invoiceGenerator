<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Manager</title>
  <meta name="description" content="A sophisticated, intuitive billing system for creating professional invoices.">

  <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation bar -->
   <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <i data-lucide="file-text" class="logo-icon"></i>
        <h1>Invoice Manager</h1>
      </div>
      <span class="status-badge status-draft" id="statusBadge">Draft</span>
    </div>
    <div class="header-right">
      <div class="currency-selector">
        <select id="currency" aria-label="Currency">
          <option value="INR" data-symbol="₹">INR (₹)</option>
          <option value="USD" data-symbol="$">USD ($)</option>
          <option value="EUR" data-symbol="€">EUR (€)</option>
          <option value="GBP" data-symbol="£">GBP (£)</option>
        </select>
      </div>
    </div>
   </header>

   <main class="main-container">
    <!-- Form Section -->
     <div class="form-panel">
      <!-- Customer Details Card -->
       <section class="card form-section" id="customer-details">
        <div class="form-grid">

          <div class="formgroup">
            <label for="billFromName">Your Name / Company
            <span class="required">*</span></label>
            <input type="text" id="billFormName" placeholder="e.g. ABC Corp" required>
          </div>

          <div class="formgroup">
            <label for="billFromAddress">Your Address</label>
            <input type="text" id="billFormAddress" placeholder="e.g. 123 street, City, Country" required>
          </div>

          <div class="formgroup">
            <label for="billFromName">Bill To (Client)
            <span class="required">*</span></label>
            <input type="text" id="billToName" placeholder="e.g. Client Name" required>
          </div>

          <div class="form-group">
            <label for="billToEmail">Client Email</label>
            <input type="email" id="billToEmail" placeholder="e.g. client@example.com">
          </div>

          <div class="form-group">
            <label for="billToPhone">Client Phone</label>
            <input type="tel" id="billToPhone" placeholder="e.g. +1 234 567 890">
          </div>

          <div class="form-group">
            <label for="invoiceDate">Invoice Date <span class="required">*</span></label>
            <input type="date" id="invoiceDate" required>
          </div>

          <div class="form-group">
            <label for="dueDate">Due Date</label>
            <input type="date" id="dueDate">
          </div>

          <div class="form-group">
            <label for="invoiceNumber">Invoice Number <span class="required">*</span></label>
            <input type="text" id="invoiceNumber" placeholder="e.g. INV-0001" required>
        </div>

        <div class="form-group form-group-full">
          <label for="billToAddress">Client Billing Address <span class="required">*</span></label>
          <input type="text" id="billToAddress" placeholder="e.g. 456 Client street, City, Country" required>
        </div>
        </div>
       </section>

       <!-- Items Card -->
        <section class="card form-section" id="items-section">
          <h2>📦 Add Items</h2>
          <div class="table-container">
            <table class="items-table">
              <thead>
                <tr>
                  <th class="col-desc">Description</th>
                  <th class="col-qty">Quantity</th>
                  <th class="col-price">Unit Price</th>
                  <th class="col-total">Total</th>
                  <th class="col-action"></th>
                </tr>
              </thead>
              <tbody id="itemList">
                <!-- rows will be rendered here -->
              </tbody>
            </table>
            <div id="emptyItemsState" class="empty-state">
              <i data-lucide="package-open" class="empty-icon"></i>
              <p>No items added yet. Click "+ Add Item" to begin.</p>
            </div>
          </div>
          <button
            type="button"
            id="addItemBtn"
            class="btn btn-secondary btn-icon-text"
          >
          <i data-lucide="plus"></i> Add Item
        </button>
        </section>

        <!-- Summary Card -->
         <section class="card form-section" id="summery-section">
          <h2>🧮 Invoice Summary</h2>
          <div class="summery-grid">
            <div class="summery-inputs">
              <div class="form-group">
                <label for="taxRate">Tax Rate (%)</label>
                <input type="number" id="taxRate" placeholder="0" min="0" step="0.1">
              </div>
              <div class="form-group">
                <label for="checkBox-label">
                  <input type="checkbox" id="enableDiscount" />
                  Enable Discount (%)
                </label>
                <input type="number" id="discountRate" placeholder="0" min="0" step="0.1" disable>
              </div>
              <div class="form-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="enableShipping" />
                  Enable Shipping (Flat)
                </label>
                <input
                  type="number"
                  id="shippingAmount"
                  placeholder="0"
                  min="0"
                  step="0.01"
                  disabled
                />
              </div>
            </div>
            <div class="summary-totals">
              <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotalDisplay">0.00</span>
              </div>
              <div class="summary-row">
                <span>Tax Amount:</span>
                <span id="taxDisplay">0.00</span>
              </div>
              <div class="summary-row" id="discountRow" style="display: none">
                <span>Discount:</span>
                <span id="discountDisplay" class="text-danger">-0.00</span>
              </div>
              <div class="summary-row" id="shippingRow" style="display: none">
                <span>Shipping:</span>
                <span id="shippingDisplay">0.00</span>
              </div>
              <div class="summary-row grand-total">
                <span>Grand Total:</span>
                <span id="grandTotalDisplay">0.00</span>
              </div>
            </div>
          </div>
         </section>

         <!-- Notes Card -->
        <section class="card form-section" id="notes-section">
          <h2>📝 Notes (Optional)</h2>
          <div class="form-group">
            <textarea
              id="notes"
              rows="4"
              placeholder="Add payment terms, thank you message, etc."
              maxlength="500"
            ></textarea>
            <div class="helper-text text-right" id="notesCounter">0/500</div>
          </div>
        </section>

        <!-- Action Buttons (Mobile Sticky Footer) -->
        <div class="action-buttons">
          <!-- Secondary actions -->
          <div class="action-group">
            <button type="button" id="resetBtn" class="btn btn-secondary">
              Reset
            </button>
            <button type="button" id="saveDraftBtn" class="btn btn-success">
              Save as Draft
            </button>
          </div>
     </div>
   </main>
</body>
</html>
